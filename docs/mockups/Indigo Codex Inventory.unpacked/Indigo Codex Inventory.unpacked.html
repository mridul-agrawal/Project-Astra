:root {
  /* -----------------------------------------------------------------------
     COLOR — manuscript materials
     No pure white, no pure black. Every surface is tinted.
     ----------------------------------------------------------------------- */

  /* Parchment surfaces (warmest → coolest) */
  --astra-ritual-white: #fbf5e4;    /* paper backing */
  --astra-palm-leaf:    #efe2c3;    /* primary canvas */
  --astra-aged:         #e3cf9f;    /* panel fills */
  --astra-aged-deep:    #cdb582;    /* inset wells */
  --astra-margin:       #b89c6b;    /* deep parchment, margins of old manuscripts */

  /* Inks */
  --astra-ink:          #1a140f;    /* lamp black — body text */
  --astra-ink-deep:     #3d2a1a;    /* deep brown — headers */
  --astra-ink-soft:     #5c4328;    /* tertiary text */
  --astra-ash:          #7a6f5c;    /* disabled, spent */

  /* Sacred accents */
  --astra-vermilion:    #b8321a;    /* sindoor, damage, faction red */
  --astra-vermilion-dim:#8f2511;    /* pressed vermilion */
  --astra-indigo:       #1f2a5a;    /* counsel, information, lore */
  --astra-indigo-dim:   #14204a;
  --astra-turmeric:     #d4a017;    /* selection, XP */
  --astra-turmeric-dim: #a87d0f;
  --astra-copper:       #9c5a2b;    /* ornament strokes, frames */
  --astra-copper-dim:   #6f3e1b;
  --astra-gold-leaf:    #c89b3c;    /* astra-tier, rare rewards */
  --astra-gold-hi:      #e3ba5a;    /* gilt highlight */
  --astra-kusha:        #5a6b3a;    /* healing, verdant terrain */

  /* Semantic tokens — refer to the palette above */
  --astra-bg:           var(--astra-palm-leaf);
  --astra-bg-panel:     var(--astra-aged);
  --astra-bg-inset:     var(--astra-aged-deep);
  --astra-fg:           var(--astra-ink);
  --astra-fg-muted:     var(--astra-ink-soft);
  --astra-fg-dim:       var(--astra-ash);
  --astra-border:       var(--astra-copper);
  --astra-border-dim:   var(--astra-copper-dim);
  --astra-accent:       var(--astra-vermilion);
  --astra-info:         var(--astra-indigo);
  --astra-select:       var(--astra-turmeric);
  --astra-rare:         var(--astra-gold-leaf);
  --astra-heal:         var(--astra-kusha);

  /* -----------------------------------------------------------------------
     TYPOGRAPHY
     ----------------------------------------------------------------------- */

  --astra-font-display:  'Cormorant Garamond', 'Tiro Devanagari Sanskrit', 'Georgia', serif;
  --astra-font-devanagari:'Tiro Devanagari Sanskrit', 'Cormorant Garamond', serif;
  --astra-font-body:     'EB Garamond', 'Georgia', 'Times New Roman', serif;
  --astra-font-label:    'Spectral SC', 'EB Garamond', serif;
  --astra-font-mono:     'JetBrains Mono', ui-monospace, monospace;

  /* Type scale — manuscript proportions, slightly wider than a typical UI scale */
  --astra-size-xxs:  10px;   /* tabular data sub-labels */
  --astra-size-xs:   12px;   /* small-caps labels */
  --astra-size-sm:   14px;   /* secondary body, tooltips */
  --astra-size-md:   16px;   /* body default */
  --astra-size-lg:   19px;   /* dialogue, lead paragraphs */
  --astra-size-xl:   24px;   /* section titles */
  --astra-size-2xl:  32px;   /* panel titles */
  --astra-size-3xl:  44px;   /* chapter titles */
  --astra-size-4xl:  64px;   /* screen titles */
  --astra-size-5xl:  96px;   /* chapter card hero */

  --astra-lh-tight:  1.15;
  --astra-lh-snug:   1.3;
  --astra-lh-body:   1.55;
  --astra-lh-loose:  1.75;

  --astra-tracking-tight:  -0.01em;
  --astra-tracking-normal: 0;
  --astra-tracking-wide:   0.08em;  /* small-caps labels */
  --astra-tracking-xwide:  0.22em;  /* structural labels: ACT · COUNSEL */

  /* -----------------------------------------------------------------------
     SPACING — 8px base
     ----------------------------------------------------------------------- */
  --astra-s-0:  0;
  --astra-s-1:  4px;
  --astra-s-2:  8px;
  --astra-s-3:  12px;
  --astra-s-4:  16px;
  --astra-s-5:  24px;
  --astra-s-6:  32px;
  --astra-s-7:  48px;
  --astra-s-8:  64px;
  --astra-s-9:  96px;

  /* -----------------------------------------------------------------------
     ORNAMENT — cartouches, rules, halos
     ----------------------------------------------------------------------- */
  --astra-frame-hair:   1px;
  --astra-frame-double: 3px;   /* inset distance for double-rule frame */
  --astra-cartouche:    28px;  /* corner cartouche size */
  --astra-cartouche-overhang: 8px;

  --astra-halo-soft:   0 0 16px rgba(212,160,23,0.35);
  --astra-halo-astra:  0 0 24px rgba(212,160,23,0.45), 0 0 48px rgba(31,42,90,0.25);

  /* -----------------------------------------------------------------------
     MOTION
     ----------------------------------------------------------------------- */
  --astra-ease:        cubic-bezier(0.2, 0.7, 0.2, 1);
  --astra-dur-quick:   180ms;
  --astra-dur-panel:   400ms;
  --astra-dur-reveal:  800ms;
}

/* =========================================================================
   Semantic element styles
   ========================================================================= */

html, body {
  background: var(--astra-bg);
  color: var(--astra-fg);
  font-family: var(--astra-font-body);

}

h3, .astra-h3 {

}

h4, .astra-h4 {

p, .astra-p {

}

.astra-lead {

}

.astra-label {

}

.astra-stat {
  font-family: var(--astra-font-mono);
  font-size: var(--astra-size-sm);
  font-variant-numeric: tabular-nums;
  color: var(--astra-ink);
}

.astra-devanagari {
  font-family: var(--astra-font-devanagari);
}

.astra-danda::after { content: " ।"; color: var(--astra-copper); }

/* =========================================================================
   ORNAMENT UTILITIES — corner cartouche frame, mandala divider
   These are styled here so preview cards and UI kits share one source.

.astra-frame {
  position: relative;
  background: var(--astra-bg-panel);

  background-image:

// ----- Dim battle map backdrop ------------------------------------------
function BattleMapBackdrop() {
  // Hint at a grid-based tactical map, then dim it.
  const tiles = [];
  const cols = 30, rows = 17, size = 64;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const biome = (Math.sin(c * 1.3 + r * 0.9) + Math.cos(c * 0.5 - r * 1.1)) * 0.5;
      let fill = '#2a3a1a';
      if (biome > 0.4) fill = '#3a4a22';
      else if (biome < -0.3) fill = '#1e2a12';
      tiles.push(
        <rect key={`${r}-${c}`} x={c*size} y={r*size} width={size} height={size}
          fill={fill} stroke="rgba(0,0,0,0.3)" strokeWidth="0.5" />
      );
    }
  }
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      <svg width="1920" height="1080" style={{ position: 'absolute', inset: 0 }}>
        {tiles}
        {/* a river snakes across */}
        <path d="M -20 620 Q 400 560 700 680 Q 1000 800 1400 720 Q 1700 660 1960 720"
          stroke="#2d4460" strokeWidth="42" fill="none" opacity="0.8" />
        {/* a unit marker */}
        <g transform="translate(900, 520)">
          <rect x="-24" y="-24" width="48" height="48" fill="rgba(31,42,90,0.6)" stroke="#c9993a" strokeWidth="1.5" />
          <circle cx="0" cy="-4" r="10" fill="#b0382a" stroke="#e8c66a" strokeWidth="1" />
        </g>
      </svg>
      {/* dim overlay */}
      <div style={{
        position: 'absolute', inset: 0,
        background: `
          radial-gradient(ellipse at 50% 50%, rgba(5,3,10,0.55) 0%, rgba(5,3,10,0.9) 80%),
          linear-gradient(180deg, rgba(15,11,46,0.65), rgba(5,3,10,0.85))
        `,
      }} />
    </div>
  );
}

          <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${C.brass}, transparent)` }} />
        </div>

        {/* three-panel body: portrait | inventory | stats */}
        <div style={{ display: 'flex', gap: 22, height: 700 }}>
          {/* far-left — portrait panel */}
          <PanelFrame flex={0.78}>
            <div style={{
              padding: '32px 24px 24px',
              display: 'flex', flexDirection: 'column', height: '100%', boxSizing: 'border-box',
            }}>
              {/* Bearer label */}
              <div style={{
                textAlign: 'center', paddingBottom: 14, marginBottom: 16,
                borderBottom: `1px solid ${C.brass}`,
              }}>
                <div style={{
                  fontFamily: 'Cinzel, serif', fontSize: 10, letterSpacing: 5,
                  color: C.brassLite, textTransform: 'uppercase',
                }}>Bearer of the Satchel</div>
                <div style={{
                  marginTop: 6,
                  fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
                  fontSize: 42, color: C.parchment, lineHeight: 1,
                  textShadow: '0 0 18px rgba(232,198,106,0.25)',
                }}>Nīla</div>
                <div style={{
                  marginTop: 4,
                  fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
                  fontSize: 16, color: C.parchDim, letterSpacing: 1,
                }}>dharmayodhā · the young vow-keeper</div>
              </div>

              {/* Portrait placeholder — arched cartouche with diagonal stripe + label */}
              <div style={{
                flex: 1, position: 'relative',
                border: `1.5px solid ${C.brass}`,
                background: `
                  linear-gradient(160deg, #2a2560 0%, #1a1540 55%, #0f0b2e 100%)
                `,
                boxShadow: 'inset 0 0 0 2px rgba(232,198,106,0.2), inset 0 0 40px rgba(0,0,0,0.55)',
                overflow: 'hidden',
              }}>
                {/* diagonal stripe placeholder weave */}
                <div style={{
                  position: 'absolute', inset: 0,
                  backgroundImage: 'repeating-linear-gradient(135deg, transparent 0 10px, rgba(232,198,106,0.08) 10px 11px)',
                }} />
                {/* archway silhouette hinting a seated figure area */}
                <svg width="100%" height="100%" viewBox="0 0 260 500" preserveAspectRatio="xMidYMid meet"
                  style={{ position: 'absolute', inset: 0 }}>
                  <defs>
                    <linearGradient id="portraitGlow" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="rgba(232,198,106,0.18)" />
                      <stop offset="100%" stopColor="rgba(232,198,106,0)" />
                    </linearGradient>
                  </defs>
                  {/* ogee arch */}
                  <path d="M 40 480 L 40 180 Q 40 80 100 70 Q 120 66 130 30 Q 140 66 160 70 Q 220 80 220 180 L 220 480 Z"
                    fill="none" stroke={C.brassLite} strokeWidth="1.2" opacity="0.55" />
                  <path d="M 50 470 L 50 185 Q 50 90 105 80 Q 123 76 130 50 Q 137 76 155 80 Q 210 90 210 185 L 210 470 Z"
                    fill="url(#portraitGlow)" />
                  {/* bust silhouette */}
                  <ellipse cx="130" cy="220" rx="38" ry="46" fill="rgba(232,198,106,0.1)" stroke={C.brass} strokeWidth="0.8" opacity="0.6" />
                  <path d="M 78 470 L 78 360 Q 78 300 130 295 Q 182 300 182 360 L 182 470 Z"
                    fill="rgba(232,198,106,0.08)" stroke={C.brass} strokeWidth="0.8" opacity="0.55" />
                </svg>
                {/* corner filigrees on portrait frame */}
                <div style={{ position: 'absolute', top: 8, left: 8 }}><CornerFiligree color={C.brassLite} rotation={0} size={32} opacity={0.75} /></div>
                <div style={{ position: 'absolute', top: 8, right: 8 }}><CornerFiligree color={C.brassLite} rotation={90} size={32} opacity={0.75} /></div>
                <div style={{ position: 'absolute', bottom: 8, right: 8 }}><CornerFiligree color={C.brassLite} rotation={180} size={32} opacity={0.75} /></div>
                <div style={{ position: 'absolute', bottom: 8, left: 8 }}><CornerFiligree color={C.brassLite} rotation={270} size={32} opacity={0.75} /></div>
                {/* mono placeholder label */}
                <div style={{
                  position: 'absolute', top: 14, left: 0, right: 0, textAlign: 'center',
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
                  color: 'rgba(242,230,196,0.55)', letterSpacing: 2,
                }}>[ portrait · Nīla ]</div>
                <div style={{
                  position: 'absolute', bottom: 14, left: 0, right: 0, textAlign: 'center',
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
                  color: 'rgba(242,230,196,0.35)', letterSpacing: 1.5,
                }}>drop hi-res bust · 3:4</div>
              </div>

              {/* vital stats strip under portrait */}
              <div style={{
                marginTop: 14, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
                background: 'rgba(0,0,0,0.35)',
                border: `1px solid rgba(232,198,106,0.3)`,
              }}>
                {[['Lv', 14], ['HP', '28/28'], ['Cls', 'Śūra']].map(([k, v], i) => (
                  <div key={k} style={{
                    padding: '10px 6px', textAlign: 'center',
                    borderRight: i < 2 ? `1px solid rgba(232,198,106,0.22)` : 'none',
                  }}>
                    <div style={{
                      fontFamily: 'Cinzel, serif', fontSize: 9, letterSpacing: 3,
                      color: C.brassLite, textTransform: 'uppercase',
                    }}>{k}</div>
                    <div style={{
                      marginTop: 2, fontFamily: 'Cormorant Garamond, serif',
                      fontSize: 20, color: C.parchment, lineHeight: 1,
                    }}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          </PanelFrame>

          {/* middle — inventory list */}
          <PanelFrame flex={1.35}>
            <div style={{ padding: '32px 28px 28px' }}>
              {/* inventory header ribbon */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 14,
                borderBottom: `1px solid ${C.brass}`, paddingBottom: 14, marginBottom: 14,
              }}>
                <div style={{
                  width: 38, height: 38, display: 'flex',
                  alignItems: 'center', justifyContent: 'center',
                  background: C.indigoLo, border: `1.5px solid ${C.brassLite}`,
                }}>
                  <AstraSigil type="sword" color={C.brassGlow} size={24} />
                </div>
                <div>
                  <div style={{
                    fontFamily: 'Cinzel, serif', fontSize: 10, letterSpacing: 4,
                    color: C.brassLite, textTransform: 'uppercase',
                  }}>Satchel contents</div>
                  <div style={{
                    fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
                    fontSize: 26, color: C.parchment, lineHeight: 1,
                  }}>Śastrāgāra <span style={{ color: C.parchDim, fontStyle: 'normal', fontSize: 18 }}>· armory</span></div>
                </div>
                <div style={{ flex: 1 }} />
                <div style={{
                  fontFamily: 'Cinzel, serif', fontSize: 11, letterSpacing: 3,
                  color: C.brassLite, textTransform: 'uppercase',
                }}>Carried <span style={{ color: C.parchment }}>4</span>/5</div>
              </div>

              {/* rows */}
              <div>
                {items.map((it, i) => (
                  <Row key={i} item={it} selected={i === selectedIdx} emptyIdx={i} />
                ))}
              </div>

              {/* footer prompt */}
              <div style={{
                marginTop: 18, paddingTop: 12,
                borderTop: `1px solid rgba(232,198,106,0.25)`,
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                fontFamily: 'Cinzel, serif', fontSize: 10, letterSpacing: 3,
                color: C.parchDim, textTransform: 'uppercase',
              }}>
                <span>▲ ▼ choose</span>
                <span>A <span style={{ color: C.brassLite }}>equip</span></span>
                <span>Y <span style={{ color: C.brassLite }}>use</span></span>
                <span>X <span style={{ color: C.brassLite }}>drop</span></span>
                <span>B <span style={{ color: C.brassLite }}>back</span></span>
              </div>
            </div>
          </PanelFrame>

          {/* right — stat preview */}
          <PanelFrame flex={1}>
            <div style={{
              padding: '32px 28px 28px',
              display: 'flex', flexDirection: 'column', height: '100%', boxSizing: 'border-box',
            }}>
              {/* header: unit + weapon */}
              <div style={{
                textAlign: 'center',
                borderBottom: `1px solid ${C.brass}`, paddingBottom: 16, marginBottom: 18,
              }}>
                <div style={{
                  fontFamily: 'Cinzel, serif', fontSize: 10, letterSpacing: 5,
                  color: C.brassLite, textTransform: 'uppercase',
                }}>With Weapon Equipped</div>
                <div style={{
                  marginTop: 6,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 16,
                }}>
                  <AstraSigil type="sword" color={C.brassGlow} size={36} />
                  <div style={{
                    fontFamily: 'Cormorant Garamond, serif', fontWeight: 600, fontSize: 54,
                    color: C.parchment, fontStyle: 'italic', lineHeight: 1, letterSpacing: 0.5,
                    textShadow: `0 0 20px rgba(232,198,106,0.25)`,
                  }}>Nīla</div>
                  <AstraSigil type="sword" color={C.brassGlow} size={36} />
                </div>
                <div style={{
                  marginTop: 10, fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
                  fontSize: 20, color: C.brassLite,
                }}>wielding · <span style={{ color: C.parchment }}>Loha Khaḍga</span></div>
              </div>

              {/* 2x2 stat grid */}
              <div style={{
                display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, flex: 1,
              }}>
                <Stat label="Atk"   value={stats.atk}   />
                <Stat label="Hit"   value={stats.hit}   />
                <Stat label="Crit"  value={stats.crit}  accent={stats.crit < 5 ? C.parchDim : '#fff5d8'} />
                <Stat label="Avoid" value={stats.avoid} />
              </div>

              {/* provenance footer */}
              <div style={{
                marginTop: 16, padding: '12px 14px',
                background: 'rgba(0,0,0,0.35)',
                border: `1px solid rgba(232,198,106,0.3)`,
                display: 'flex', alignItems: 'center', gap: 12,
              }}>
                <div style={{
                  width: 6, height: 6, transform: 'rotate(45deg)', background: C.brassLite,
                  boxShadow: `0 0 6px ${C.brassLite}`,
                }} />
                <div style={{
                  fontFamily: 'Cormorant Garamond, serif', fontSize: 16, fontStyle: 'italic',
                  color: C.parchDim, lineHeight: 1.35,
                }}>
                  <span style={{ color: C.brassLite }}>iron-forged blade · </span>
                  projected against current target
                </div>
              </div>
            </div>
          </PanelFrame>
        </div>
      </div>
    </div>
  );
}

// ----- fit to viewport --------------------------------------------------
function fit() {
  const el = document.getElementById('canvas');
  const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  el.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fit);
fit();
ReactDOM.createRoot(document.getElementById('root')).render(<Screen />);
</script>


</body></html>
